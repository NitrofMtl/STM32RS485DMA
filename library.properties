sentence=High-performance RS485 driver for STM32 using UART + DMA.
paragraph=STM32RS485DMA provides a DMA-based RS485 implementation for STM32 boards using the Arduino core. It supports full-duplex and half-duplex RS485 with precise timing, idle detection, and minimal CPU usage. Designed and validated on Opta (STM32H7). Other STM32 families may work with additional configuration.
